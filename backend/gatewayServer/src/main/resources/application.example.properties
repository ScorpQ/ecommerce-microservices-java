spring.application.name=api-gateway
server.port=8763

spring.profiles.active=local
spring.cloud.compatibility-verifier.enabled=false
spring.main.allow-bean-definition-overriding=true

spring.config.import=optional:configserver:${CONFIG_URI:http://localhost:8762}
spring.cloud.config.uri=${CONFIG_URI:http://localhost:8762}

eureka.client.service-url.defaultZone=${EUREKA_URI:http://localhost:8761/eureka}
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

spring.cloud.gateway.discovery.locator.enabled=${GATEWAY_DISCOVERY_ENABLED:false}
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

spring.cloud.gateway.server.webmvc.routes[0].id=PRODUCT-SERVICE
spring.cloud.gateway.server.webmvc.routes[0].uri=lb://PRODUCT-SERVICE
spring.cloud.gateway.server.webmvc.routes[0].predicates[0]=Path=/api/product/**

spring.cloud.gateway.server.webmvc.routes[1].id=SHOPPING-CART-SERVICE
spring.cloud.gateway.server.webmvc.routes[1].uri=lb://SHOPPING-CART-SERVICE
spring.cloud.gateway.server.webmvc.routes[1].predicates[0]=Path=/api/cart/**

spring.cloud.gateway.server.webmvc.routes[2].id=ORDER-SERVICE
spring.cloud.gateway.server.webmvc.routes[2].uri=lb://ORDER-SERVICE
spring.cloud.gateway.server.webmvc.routes[2].predicates[0]=Path=/api/orders/**

spring.cloud.gateway.server.webmvc.routes[3].id=USER-SERVICE
spring.cloud.gateway.server.webmvc.routes[3].uri=lb://USER-SERVICE
spring.cloud.gateway.server.webmvc.routes[3].predicates[0]=Path=/api/user/**

spring.cloud.gateway.server.webmvc.routes[4].id=PAYMENT-SERVICE
spring.cloud.gateway.server.webmvc.routes[4].uri=lb://PAYMENT-SERVICE
spring.cloud.gateway.server.webmvc.routes[4].predicates[0]=Path=/api/payment/**

management.endpoints.web.exposure.include=health,info
