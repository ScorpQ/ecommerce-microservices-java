spring.application.name=user-service
server.port=8086

spring.config.import=optional:configserver:${CONFIG_URI:http://localhost:8762}
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

eureka.client.service-url.defaultZone=${EUREKA_URI:http://localhost:8761/eureka}
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

spring.datasource.url=jdbc:postgresql://${DB_HOST:n11-bootcamp.c1q80qkio9ll.eu-north-1.rds.amazonaws.com}:5432/user_db
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=20000

keycloak.token-uri=${KEYCLOAK_TOKEN_URI:http://n11-final-case.duckdns.org:8180/realms/microservice-realm/protocol/openid-connect/token}
keycloak.admin-base-uri=${KEYCLOAK_ADMIN_BASE_URI:http://n11-final-case.duckdns.org:8180}
keycloak.client-id=user-services
keycloak.client-secret=${KEYCLOAK_CLIENT_SECRET:2gas3iYvO749mdkUqrS2kwI0vfB2bpx9}
keycloak.admin-username=${KEYCLOAK_ADMIN_USERNAME:admin}
keycloak.admin-password=${KEYCLOAK_ADMIN_PASSWORD:admin}

spring.security.oauth2.resourceserver.jwt.issuer-uri=${KEYCLOAK_ISSUER_URI:http://n11-final-case.duckdns.org:8180/realms/microservice-realm}

management.endpoints.web.exposure.include=*
management.endpoints.web.base-path=/actuator

spring.main.allow-bean-definition-overriding=true 
spring.cloud.compatibility-verifier.enabled=false
