spring.application.name=product-service
server.port=8085

spring.config.import=optional:configserver:
spring.cloud.config.uri=http://localhost:8762
spring.cloud.config.import-check.enabled=false
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}
spring.cloud.compatibility-verifier.enabled=false
spring.main.allow-bean-definition-overriding=true

eureka.client.service-url.defaultZone=${EUREKA_URI:http://localhost:8761/eureka}
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

spring.datasource.url=jdbc:postgresql://${DB_HOST:n11-bootcamp.c1q80qkio9ll.eu-north-1.rds.amazonaws.com}:5432/product_db
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=20000

aws.s3.bucket-name=${AWS_S3_BUCKET:image-bucket-n11}
aws.s3.region=${AWS_S3_REGION:eu-north-1}
aws.access-key=${AWS_ACCESS_KEY:dummy}
aws.secret-key=${AWS_SECRET_KEY:dummy}

spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

management.endpoints.web.exposure.include=health,info

opensearch.url=${OPENSEARCH_URL:https://search-n11-elastic-b7yaekieyypp4gqmh75vgy6wum.aos.eu-north-1.on.aws}
opensearch.username=${OPENSEARCH_USERNAME:admin}
opensearch.password=${OPENSEARCH_PASSWORD:Battle.scarred*123}
