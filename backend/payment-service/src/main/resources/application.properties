spring.application.name=payment-service
server.port=8091

spring.config.import=optional:configserver:${CONFIG_URI:http://localhost:8762}
spring.cloud.config.import-check.enabled=false
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}
spring.cloud.compatibility-verifier.enabled=false
spring.main.allow-bean-definition-overriding=true

eureka.client.service-url.defaultZone=${EUREKA_URI:http://localhost:8761/eureka}
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true

spring.datasource.url=jdbc:postgresql://${DB_HOST:n11-bootcamp.c1q80qkio9ll.eu-north-1.rds.amazonaws.com}:5432/payment_db
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=20000

iyzico.api-key=${IYZICO_API_KEY:sandbox-cASR8VTyRVCpZUDR9tEpa42pgc3vnQx3}
iyzico.secret-key=${IYZICO_SECRET_KEY:sandbox-PxfSFiuVV1BbPlwvMJL3ttpx7vpJlbJU}
iyzico.base-url=${IYZICO_BASE_URL:https://sandbox-api.iyzipay.com}

management.endpoints.web.exposure.include=health,info
