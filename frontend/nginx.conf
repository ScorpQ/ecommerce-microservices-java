server {
    listen 80;
    server_name n11-final-case.duckdns.org;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name n11-final-case.duckdns.org;

    ssl_certificate /etc/letsencrypt/live/n11-final-case.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/n11-final-case.duckdns.org/privkey.pem;

    root /usr/share/nginx/html;
    index index.html;

    location /api/ {
        proxy_pass http://gateway:8763;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
